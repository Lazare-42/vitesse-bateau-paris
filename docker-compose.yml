services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: sillage_9ffe5e30
      POSTGRES_USER: sillage_9ffe5e30
      POSTGRES_PASSWORD: sillage_9ffe5e30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sillage_9ffe5e30"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      VITESSE_DB_URL: "postgres://sillage_9ffe5e30:sillage_9ffe5e30@postgres:5432/sillage_9ffe5e30?sslmode=disable"
      VITESSE_AIS_API_KEY: "${VITESSE_AIS_API_KEY}"
    restart: unless-stopped

volumes:
  pgdata:
